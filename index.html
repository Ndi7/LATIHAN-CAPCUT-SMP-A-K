
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan CapCut Bimbel TEVA</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0f3d2e, #1f7a5a, #4caf7a);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 92%;
      max-width: 700px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      color: #e6fff3;
    }

    p {
      text-align: center;
      color: #d9f7ea;
      margin-bottom: 30px;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .card {
      text-decoration: none;
      color: #ffffff;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      border-radius: 18px;
      padding: 36px 20px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 22px 44px rgba(0,0,0,0.4);
    }

    .card span {
      display: block;
      font-size: 1rem;
      font-weight: 400;
      margin-top: 10px;
      color: #eafff5;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.85rem;
      color: #c9f2e0;
    }

    @media (max-width: 640px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎬 Latihan CapCut<br>Bimbel TEVA</h1>
    <p>Pilih materi untuk mulai latihan editing</p>

    <div class="cards">
      <a href="https://drive.google.com/drive/folders/xxxx" class="card">
        📹 Dasar
        <span>Latihan CapCut Pemula</span>
      </a>

      <a href="https://drive.google.com/drive/folders/yyyy" class="card">
        🎞️ Lanjutan
        <span>Latihan CapCut Tingkat Lanjut</span>
      </a>

      <a href="https://drive.google.com/drive/folders/zzzz" class="card">
        🎶 Musik & Efek
        <span>Latihan Editing Audio</span>
      </a>

      <a href="https://drive.google.com/drive/folders/aaaa" class="card">
        🌟 Kreatif
        <span>Latihan Transisi & Visual</span>
      </a>
    </div>

    <footer>
      © <span id="year"></span> Bimbel TEVA • 
      Creative Learning Center • 
      Designed & Developed by Sseam Andi
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
